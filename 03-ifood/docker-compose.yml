version: '3.8'

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth-ifood
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-ifood
    ports:
      - "6379:6379"
    restart: unless-stopped

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight-ifood
    ports:
      - "5540:5540"
    depends_on:
      - redis
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-ifood
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: auth-service-ifood
    ports:
      - "127.0.0.1:50051:50051"
    environment:
      - PORT=50051
      - BIND_ADDR=0.0.0.0:50051
      - DB_DSN=postgres://auth_user:auth_password@postgres-auth:5432/auth_db?sslmode=disable
      - JWT_SECRET=test-secret-key-change-in-prod
      - OTEL_COLLECTOR_ADDR=jaeger:4317
    depends_on:
      - postgres-auth
      - jaeger
    restart: unless-stopped

  postgres-restaurant:
    image: postgres:16-alpine
    container_name: postgres-restaurant-ifood
    environment:
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_password
      POSTGRES_DB: restaurant_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-restaurant-data:/var/lib/postgresql/data
    restart: unless-stopped

  restaurant-service:
    build:
      context: .
      dockerfile: apps/restaurant-service/Dockerfile
    container_name: restaurant-service-ifood
    ports:
      - "127.0.0.1:50052:50052"
    environment:
      - PORT=50052
      - BIND_ADDR=0.0.0.0:50052
      - DB_DSN=postgres://restaurant_user:restaurant_password@postgres-restaurant:5432/restaurant_db?sslmode=disable
      - OTEL_COLLECTOR_ADDR=jaeger:4317
    depends_on:
      - postgres-restaurant
      - jaeger
    restart: unless-stopped

  cart-service:
    build:
      context: .
      dockerfile: apps/cart-service/Dockerfile
    container_name: cart-service-ifood
    ports:
      - "127.0.0.1:50053:50053"
    environment:
      - PORT=50053
      - BIND_ADDR=0.0.0.0:50053
      - REDIS_ADDR=redis:6379
      - OTEL_COLLECTOR_ADDR=jaeger:4317
    depends_on:
      - redis
      - jaeger
    restart: unless-stopped

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order-ifood
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: order_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment-ifood
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
      POSTGRES_DB: payment_db
    ports:
      - "5435:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    container_name: order-service-ifood
    ports:
      - "127.0.0.1:50054:50054"
    environment:
      - PORT=50054
      - BIND_ADDR=0.0.0.0:50054
      - DB_DSN=postgres://order_user:order_password@postgres-order:5432/order_db?sslmode=disable
      - OTEL_COLLECTOR_ADDR=jaeger:4317
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres-order
      - jaeger
      - rabbitmq
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    container_name: payment-service-ifood
    ports:
      - "127.0.0.1:50055:50055"
    environment:
      - PORT=50055
      - BIND_ADDR=0.0.0.0:50055
      - DB_DSN=postgres://payment_user:payment_password@postgres-payment:5432/payment_db?sslmode=disable
      - OTEL_COLLECTOR_ADDR=jaeger:4317
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres-payment
      - jaeger
      - rabbitmq
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: notification-service-ifood
    ports:
      - "127.0.0.1:9096:9096"
    environment:
      - PORT=9096
      - BIND_ADDR=0.0.0.0:9096
      - OTEL_COLLECTOR_ADDR=jaeger:4317
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_ADDR=redis:6379
    depends_on:
      - jaeger
      - rabbitmq
      - redis
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: gateway-ifood
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      - PORT=8080
      - BIND_ADDR=0.0.0.0:8080
      - AUTH_SERVICE_ADDR=auth-service:50051
      - RESTAURANT_SERVICE_ADDR=restaurant-service:50052
      - CART_SERVICE_ADDR=cart-service:50053
      - ORDER_SERVICE_ADDR=order-service:50054
      - OTEL_COLLECTOR_ADDR=jaeger:4317
      - REDIS_ADDR=redis:6379
    depends_on:
      - auth-service
      - restaurant-service
      - cart-service
      - order-service
      - jaeger
      - redis
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: web-ifood
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: apps/simulator/Dockerfile
    container_name: simulator-ifood
    environment:
      - GATEWAY_URL=http://gateway:8080
      - CONCURRENT_USERS=5
    depends_on:
      - gateway
    restart: unless-stopped


  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger-ifood
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus-ifood
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: loki-ifood
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail-ifood
    user: "root"
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/loki/promtail.yml:/etc/promtail/promtail.yml
    command: -config.file=/etc/promtail/promtail.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana-ifood
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
      - jaeger
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  grafana-setup:
    image: curlimages/curl:latest
    container_name: grafana-setup-ifood
    depends_on:
      grafana:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command: >
      "playlists=$$(curl -s http://admin:admin@grafana:3000/api/playlists);
      for uid in $$(echo \"$$playlists\" | grep -o '\"uid\":\"[^\"]*\"' | cut -d'\"' -f4); do
        curl -s -X DELETE http://admin:admin@grafana:3000/api/playlists/$$uid;
      done;
      curl -s -X POST -H 'Content-Type: application/json' -d @/etc/grafana-playlist/playlist.json http://admin:admin@grafana:3000/api/playlists"
    volumes:
      - ./infra/grafana/playlist.json:/etc/grafana-playlist/playlist.json
    restart: "no"

volumes:
  postgres-auth-data:
  postgres-restaurant-data:
  postgres-order-data:
  postgres-payment-data:
