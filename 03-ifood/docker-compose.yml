version: '3.8'

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth-ifood
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-ifood
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-ifood
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: auth-service-ifood
    ports:
      - "127.0.0.1:50051:50051"
    environment:
      - PORT=50051
      - BIND_ADDR=0.0.0.0:50051
      - DB_DSN=postgres://auth_user:auth_password@postgres-auth:5432/auth_db?sslmode=disable
      - JWT_SECRET=test-secret-key-change-in-prod
    depends_on:
      - postgres-auth
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: gateway-ifood
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      - PORT=8080
      - BIND_ADDR=0.0.0.0:8080
      - AUTH_SERVICE_ADDR=auth-service:50051
    depends_on:
      - auth-service
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: web-ifood
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres-auth-data:
