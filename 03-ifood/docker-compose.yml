version: '3.8'

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth-ifood
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-ifood
    ports:
      - "6379:6379"
    restart: unless-stopped

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight-ifood
    ports:
      - "5540:5540"
    environment:
      - RI_ACCEPT_TERMS_AND_CONDITIONS=true
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=RedisStore
    depends_on:
      - redis
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-ifood
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: auth-service-ifood
    ports:
      - "127.0.0.1:50051:50051"
    environment:
      - PORT=50051
      - BIND_ADDR=0.0.0.0:50051
      - DB_DSN=postgres://auth_user:auth_password@postgres-auth:5432/auth_db?sslmode=disable
      - JWT_SECRET=test-secret-key-change-in-prod
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
    depends_on:
      - postgres-auth
      - otel-collector
    restart: unless-stopped

  postgres-restaurant:
    image: postgres:16-alpine
    container_name: postgres-restaurant-ifood
    environment:
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_password
      POSTGRES_DB: restaurant_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-restaurant-data:/var/lib/postgresql/data
    restart: unless-stopped

  restaurant-service:
    build:
      context: .
      dockerfile: apps/restaurant-service/Dockerfile
    container_name: restaurant-service-ifood
    ports:
      - "127.0.0.1:50052:50052"
    environment:
      - PORT=50052
      - BIND_ADDR=0.0.0.0:50052
      - DB_DSN=postgres://restaurant_user:restaurant_password@postgres-restaurant:5432/restaurant_db?sslmode=disable
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres-restaurant
      - otel-collector
      - rabbitmq
    restart: unless-stopped

  cart-service:
    build:
      context: .
      dockerfile: apps/cart-service/Dockerfile
    container_name: cart-service-ifood
    ports:
      - "127.0.0.1:50053:50053"
    environment:
      - PORT=50053
      - BIND_ADDR=0.0.0.0:50053
      - REDIS_ADDR=redis:6379
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
    depends_on:
      - redis
      - otel-collector
    restart: unless-stopped

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order-ifood
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: order_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment-ifood
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
      POSTGRES_DB: payment_db
    ports:
      - "5435:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-analytics:
    image: postgres:16-alpine
    container_name: postgres-analytics-ifood
    environment:
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_password
      POSTGRES_DB: analytics_db
    ports:
      - "5436:5432"
    volumes:
      - postgres-analytics-data:/var/lib/postgresql/data
    restart: unless-stopped


  order-service:
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    container_name: order-service-ifood
    ports:
      - "127.0.0.1:50054:50054"
    environment:
      - PORT=50054
      - BIND_ADDR=0.0.0.0:50054
      - DB_DSN=postgres://order_user:order_password@postgres-order:5432/order_db?sslmode=disable
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres-order
      - otel-collector
      - rabbitmq
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    container_name: payment-service-ifood
    ports:
      - "127.0.0.1:50055:50055"
    environment:
      - PORT=50055
      - BIND_ADDR=0.0.0.0:50055
      - DB_DSN=postgres://payment_user:payment_password@postgres-payment:5432/payment_db?sslmode=disable
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres-payment
      - otel-collector
      - rabbitmq
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: notification-service-ifood
    ports:
      - "127.0.0.1:9096:9096"
    environment:
      - PORT=9096
      - BIND_ADDR=0.0.0.0:9096
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_ADDR=redis:6379
    depends_on:
      - otel-collector
      - rabbitmq
      - redis
    restart: unless-stopped

  delivery-service:
    build:
      context: .
      dockerfile: apps/delivery-service/Dockerfile
    container_name: delivery-service-ifood
    ports:
      - "127.0.0.1:9097:9097"
    environment:
      - PORT=9097
      - BIND_ADDR=0.0.0.0:9097
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - otel-collector
      - rabbitmq
      - order-service
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: gateway-ifood
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      - PORT=8080
      - BIND_ADDR=0.0.0.0:8080
      - AUTH_SERVICE_ADDR=auth-service:50051
      - RESTAURANT_SERVICE_ADDR=restaurant-service:50052
      - CART_SERVICE_ADDR=cart-service:50053
      - ORDER_SERVICE_ADDR=order-service:50054
      - SEARCH_SERVICE_ADDR=search-service:50056
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
      - REDIS_ADDR=redis:6379
    depends_on:
      - auth-service
      - restaurant-service
      - cart-service
      - order-service
      - search-service
      - otel-collector
      - redis
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: web-ifood
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: apps/simulator/Dockerfile
    container_name: simulator-ifood
    environment:
      - GATEWAY_URL=http://gateway:8080
      - CONCURRENT_USERS=5
    depends_on:
      - gateway
    restart: unless-stopped


  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch-ifood
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    container_name: opensearch-dashboards-ifood
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    restart: unless-stopped

  opensearch-setup:
    image: curlimages/curl:latest
    container_name: opensearch-setup-ifood
    depends_on:
      - opensearch-dashboards
    entrypoint: ["sh", "-c"]
    command: >
      "echo 'Waiting for OpenSearch Dashboards to start...';
      until curl -s -o /dev/null -w '%{http_code}' http://opensearch-dashboards:5601/api/status | grep -q '200'; do
        sleep 2;
      done;
      echo 'Creating restaurants index pattern...';
      curl -s -X POST http://opensearch-dashboards:5601/api/saved_objects/index-pattern/restaurants -H 'osd-xsrf: true' -H 'Content-Type: application/json' -d '{\"attributes\":{\"title\":\"restaurants\"}}';
      echo 'Creating menu_items index pattern...';
      curl -s -X POST http://opensearch-dashboards:5601/api/saved_objects/index-pattern/menu_items -H 'osd-xsrf: true' -H 'Content-Type: application/json' -d '{\"attributes\":{\"title\":\"menu_items\"}}';
      echo 'OpenSearch Dashboards setup completed!';"




  search-service:
    build:
      context: .
      dockerfile: apps/search-service/Dockerfile
    container_name: search-service-ifood
    ports:
      - "127.0.0.1:50056:50056"
    environment:
      - PORT=50056
      - BIND_ADDR=0.0.0.0:50056
      - OPENSEARCH_URL=http://opensearch:9200
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
    depends_on:
      - opensearch
      - rabbitmq
      - otel-collector
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: apps/analytics-service/Dockerfile
    container_name: analytics-service-ifood
    ports:
      - "127.0.0.1:50057:50057"
    environment:
      - PORT=50057
      - BIND_ADDR=0.0.0.0:50057
      - DB_DSN=postgres://analytics_user:analytics_password@postgres-analytics:5432/analytics_db?sslmode=disable
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres-analytics
      - otel-collector
      - rabbitmq
    restart: unless-stopped



  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger-ifood
    ports:
      - "16686:16686"
    environment:
      - METRICS_STORAGE_TYPE=prometheus
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
      - PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR=true
    volumes:
      - ./infra/jaeger/ui-config.json:/etc/jaeger/ui-config.json
    command: ["--query.ui-config", "/etc/jaeger/ui-config.json"]
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: otel-collector-ifood
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./infra/otel-collector/otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4317:4317"
      - "8889:8889"
    depends_on:
      - jaeger
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus-ifood
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/rules.yml:/etc/prometheus/rules.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: loki-ifood
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail-ifood
    user: "root"
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/loki/promtail.yml:/etc/promtail/promtail.yml
    command: -config.file=/etc/promtail/promtail.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana-ifood
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
      - jaeger
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  grafana-setup:
    image: curlimages/curl:latest
    container_name: grafana-setup-ifood
    depends_on:
      grafana:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command: >
      "playlists=$$(curl -s http://admin:admin@grafana:3000/api/playlists);
      for uid in $$(echo \"$$playlists\" | grep -o '\"uid\":\"[^\"]*\"' | cut -d'\"' -f4); do
        curl -s -X DELETE http://admin:admin@grafana:3000/api/playlists/$$uid;
      done;
      curl -s -X POST -H 'Content-Type: application/json' -d @/etc/grafana-playlist/playlist.json http://admin:admin@grafana:3000/api/playlists"
    volumes:
      - ./infra/grafana/playlist.json:/etc/grafana-playlist/playlist.json
    restart: "no"

volumes:
  postgres-auth-data:
  postgres-restaurant-data:
  postgres-order-data:
  postgres-payment-data:
  postgres-analytics-data:
  opensearch-data:
