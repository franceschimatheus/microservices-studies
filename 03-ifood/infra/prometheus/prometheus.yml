global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:9091']

  - job_name: 'restaurant-service'
    static_configs:
      - targets: ['restaurant-service:9092']

  - job_name: 'cart-service'
    static_configs:
      - targets: ['cart-service:9093']

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:9094']

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:9095']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'delivery-service'
    static_configs:
      - targets: ['delivery-service:9097']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:9096']




