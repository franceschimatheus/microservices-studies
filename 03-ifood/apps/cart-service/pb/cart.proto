syntax = "proto3";

package cart;

option go_package = "cart-service/pb";

service CartService {
  rpc AddItem (AddItemRequest) returns (CartResponse);
  rpc RemoveItem (RemoveItemRequest) returns (CartResponse);
  rpc GetCart (GetCartRequest) returns (CartResponse);
  rpc ClearCart (ClearCartRequest) returns (ClearCartResponse);
}

message CartItem {
  string menu_item_id = 1;
  string name = 2;
  double price = 3;
  int32 quantity = 4;
}

message CartResponse {
  string user_id = 1;
  repeated CartItem items = 2;
  double total_price = 3;
  string restaurant_id = 4;
}

message AddItemRequest {
  string user_id = 1;
  string menu_item_id = 2;
  string name = 3;
  double price = 4;
  int32 quantity = 5;
  string restaurant_id = 6;
}

message RemoveItemRequest {
  string user_id = 1;
  string menu_item_id = 2;
}

message GetCartRequest {
  string user_id = 1;
}

message ClearCartRequest {
  string user_id = 1;
}

message ClearCartResponse {
  bool success = 1;
}
