global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:9091']

  - job_name: 'restaurant-service'
    static_configs:
      - targets: ['restaurant-service:9092']

  - job_name: 'cart-service'
    static_configs:
      - targets: ['cart-service:9093']

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:9094']
