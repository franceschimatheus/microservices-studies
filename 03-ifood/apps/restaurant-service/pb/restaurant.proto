syntax = "proto3";

package restaurant;

option go_package = "restaurant-service/pb";

service RestaurantService {
  rpc CreateRestaurant (CreateRestaurantRequest) returns (RestaurantResponse);
  rpc UpdateRestaurant (UpdateRestaurantRequest) returns (RestaurantResponse);
  rpc GetRestaurant (GetRestaurantRequest) returns (RestaurantResponse);
  rpc ListRestaurants (ListRestaurantsRequest) returns (ListRestaurantsResponse);

  rpc CreateCategory (CreateCategoryRequest) returns (CategoryResponse);
  rpc ListCategories (ListCategoriesRequest) returns (ListCategoriesResponse);

  rpc CreateMenuItem (CreateMenuItemRequest) returns (MenuItemResponse);
  rpc UpdateMenuItem (UpdateMenuItemRequest) returns (MenuItemResponse);
  rpc DeleteMenuItem (DeleteMenuItemRequest) returns (DeleteMenuItemResponse);
  rpc GetMenu (GetMenuRequest) returns (GetMenuResponse);
}

message RestaurantResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  string address = 4;
  string created_at = 5;
}

message CreateRestaurantRequest {
  string name = 1;
  string description = 2;
  string address = 3;
}

message UpdateRestaurantRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string address = 4;
}

message GetRestaurantRequest {
  string id = 1;
}

message ListRestaurantsRequest {}

message ListRestaurantsResponse {
  repeated RestaurantResponse restaurants = 1;
}

message CategoryResponse {
  string id = 1;
  string restaurant_id = 2;
  string name = 3;
}

message CreateCategoryRequest {
  string restaurant_id = 1;
  string name = 2;
}

message ListCategoriesRequest {
  string restaurant_id = 1;
}

message ListCategoriesResponse {
  repeated CategoryResponse categories = 1;
}

message MenuItemResponse {
  string id = 1;
  string category_id = 2;
  string name = 3;
  string description = 4;
  double price = 5;
  bool available = 6;
}

message CreateMenuItemRequest {
  string category_id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
}

message UpdateMenuItemRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  bool available = 5;
}

message DeleteMenuItemRequest {
  string id = 1;
}

message DeleteMenuItemResponse {
  bool success = 1;
}

message GetMenuRequest {
  string restaurant_id = 1;
}

message GetMenuResponse {
  repeated MenuItemResponse items = 1;
}
