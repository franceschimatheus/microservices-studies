services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-study
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # Management Web UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped
